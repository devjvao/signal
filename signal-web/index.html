<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/src/assets/png/apple-touch-icon-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/src/assets/png/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/src/assets/png/favicon-16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal</title>
    <script>
      // Apply the persisted (or system) theme before first paint so every page —
      // including logged-out auth pages without a ThemeToggle — honors it (no FOUC).
      (function () {
        try {
          var t = localStorage.getItem("signal_theme")
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
          }
          if (t === "dark") document.documentElement.classList.add("dark")
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
